# Example of /etc/openvpn-manager/config.conf
# ---------------------------------------------------------------------------
# Written and maintained by openvpn-manager itself; shown here for reference.
# Format: KEY=VALUE, one per line. The tool PARSES this file against a key
# whitelist (it is never sourced as shell code). File mode must be 0600 root.
# ---------------------------------------------------------------------------

# Installation state
INSTALLED=yes

# What clients connect to
ENDPOINT=vpn.example.com
PORT=1194
PROTOCOL=udp

# Networking
NIC=eth0
IPV6_ENABLED=no

# DNS pushed to clients
DNS1=1.1.1.1
DNS2=1.0.0.1
DNS_LABEL=Cloudflare

# PKI
SERVER_NAME=server_1a2b3c4d5e6f

# Authentication
#   cert | password | password_totp | yubikey | password_yubikey
AUTH_MODE=password_totp
# yes = users without a TOTP secret may log in with password only (nullok)
TOTP_NULLOK=no
# yes = the PAM username must equal the certificate CN (recommended)
ENFORCE_CN_MATCH=yes

# YubiKey OTP validation (YubiCloud API key, or self-hosted URL)
YUBICO_ID=12345
YUBICO_KEY=base64secretkeyfromyubico=
YUBICO_URL=

# --- Cryptographic settings (see docs/CRYPTO.md) ---------------------------
# Key type for CA/server/client certificates: ec | rsa
PKI_ALGO=ec
# Curve when PKI_ALGO=ec: prime256v1 | secp384r1 | secp521r1
PKI_CURVE=prime256v1
# Key size when PKI_ALGO=rsa: 2048 | 3072 | 4096
PKI_RSA_BITS=4096
# Colon-separated AEAD data ciphers (negotiated in order)
DATA_CIPHERS=AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305
# data-ciphers-fallback for clients without cipher negotiation
DATA_FALLBACK=AES-256-GCM
# Minimum TLS version for the control channel: 1.2 | 1.3
TLS_MIN=1.2
# Control-channel protection: tls-crypt (recommended) | tls-auth (legacy)
CONTROL_WRAP=tls-crypt
# HMAC / certificate signature digest: SHA256 | SHA384 | SHA512
AUTH_DIGEST=SHA256
# Validity periods in days (certificates can never outlive the CA)
CA_DAYS=3650
SERVER_CERT_DAYS=3650
CLIENT_CERT_DAYS=3650
CRL_DAYS=3650

# Firewall backend chosen at install time: firewalld | ufw | iptables
FIREWALL_BACKEND=ufw

# Resolved path of openvpn-plugin-auth-pam.so (set when a PAM mode is enabled)
PLUGIN_PATH=/usr/lib/x86_64-linux-gnu/openvpn/plugins/openvpn-plugin-auth-pam.so
